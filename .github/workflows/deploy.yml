name: Deploy

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: curl, mbstring, pdo_mysql, tokenizer, xml, zip, zlib, ctype, openssl, fileinfo, bcmath

            - uses: actions/checkout@v4

            - name: Install Dependencies
              run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

            - name: Node JS
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Instal·la les dependències de Node JS
              run: npm install
            - name: Configura .env per al build
              run: | 
               cp .env.example .env
            - name: Compila vue.js
              run: npm run build
            - name: Fent neteja
              run: rm -rf node_modules
            - name: Esborrar carpeta storage
              run: rm -rf storage
            - name: Comprimir el projecte  (incloent els ocults)
              run: tar -czf app.tgz $(ls -A)
            - name: Envia app.tgz al servidor
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  password: ${{ secrets.SSH_PASS }}
                  port: ${{ secrets.SSH_PORT }}
                  source: 'app.tgz'
                  target: ${{ secrets.DOCUMENT_ROOT }}
            - name: Es connecta per ssh per fer el desplegament
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  password: ${{ secrets.SSH_PASS }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      echo "Descomprimint el fitxer app.tgz"
                      cd ${{ secrets.DOCUMENT_ROOT }}
                      tar -xzf app.tgz
                      pwd
                      ls -lisa
                      echo "Copiar el fitxer env si no el tenim"
                      $(which php84) -r "file_exists('.env') || copy('.env.example', '.env');"
                      echo "Canvia el fitxer env"
                      sed -i "s/DB_CONNECTION=mysql/DB_CONNECTION=${{ secrets.DB_CONNECTION }}/g" .env
                      sed -i "s/DB_HOST=.*/DB_HOST=${{ secrets.DB_HOST }}/g" .env
                      sed -i "s|^DB_PORT=.*|DB_PORT=${{ secrets.DB_PORT }}|" .env
                      sed -i "s/^DB_DATABASE=.*/DB_DATABASE=${{ secrets.DB_DATABASE }}/" .env
                      sed -i "s/^DB_USERNAME=.*/DB_USERNAME=${{ secrets.DB_USERNAME }}/" .env
                      sed -i "s/^DB_PASSWORD=.*/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/" .env
                      sed -i "s/^MAIL_HOST=.*/MAIL_HOST=${{ secrets.MAIL_HOST }}/" .env
                      sed -i "s/^MAIL_PORT=.*/MAIL_PORT=${{ secrets.MAIL_PORT }}/" .env
                      sed -i "s/^MAIL_USERNAME=.*/MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}/" .env
                      sed -i "s/^MAIL_PASSWORD=.*/MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}/" .env
                      sed -i "s/^MAIL_FROM_ADDRESS=.*/MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}/" .env
                      sed -i "s/^MAIL_EHLO_DOMAIN=.*/MAIL_EHLO_DOMAIN=${{ secrets.MAIL_EHLO_DOMAIN }}/" .env
                      

                      # Configurar tot el .env :/ 
                      $(which php84) artisan config:clear
                      $(which php84) artisan key:generate
                      echo "Executar migracions, cache i altres operacions de Laravel"
                      $(which php84) artisan migrate --force
                      $(which php84) artisan optimize:clear
                      $(which php84) artisan optimize
                      $(which php84) artisan storage:unlink
                      $(which php84) artisan storage:link
                      $(which php84) artisan lang:publish
